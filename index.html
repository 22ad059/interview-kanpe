<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接カンペ</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --panel2: #232736;
    --text: #e8eaf2;
    --sub: #8a90a5;
    --accent: #4f8cff;
    --accent2: #34d399;
    --danger: #f87171;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(15, 17, 23, 0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #2a2e3f;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 18px;
    margin: 0;
    margin-right: auto;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    cursor: pointer;
    color: #fff;
    background: var(--panel2);
    transition: filter 0.15s;
  }
  button:hover { filter: brightness(1.2); }
  #pipBtn {
    background: linear-gradient(135deg, #4f8cff, #6d5cff);
    font-weight: 600;
  }
  #addBtn { background: var(--panel2); }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 20px 80px;
  }
  .hint {
    background: #1c2233;
    border: 1px solid #2c3550;
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: #aeb8d8;
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .hint b { color: #dbe3ff; }
  .card {
    background: var(--panel);
    border: 1px solid #2a2e3f;
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .card-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--panel2);
  }
  .card-head input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    outline: none;
  }
  .card-head .move, .card-head .del {
    background: transparent;
    padding: 4px 8px;
    font-size: 14px;
    color: var(--sub);
  }
  .card-head .del:hover { color: var(--danger); }
  .card textarea {
    display: block;
    width: 100%;
    min-height: 110px;
    background: transparent;
    border: none;
    resize: vertical;
    color: var(--text);
    font-size: 15px;
    line-height: 1.8;
    padding: 14px;
    font-family: inherit;
    outline: none;
  }
  .status {
    position: fixed;
    bottom: 16px;
    right: 20px;
    font-size: 12px;
    color: var(--sub);
    background: var(--panel);
    border: 1px solid #2a2e3f;
    padding: 6px 12px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .status.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>🎤 面接カンペ</h1>
  <button id="addBtn">＋ カード追加</button>
  <button id="pipBtn">📌 カンペを最前面に表示</button>
</header>

<main>
  <div class="hint">
    <b>使い方：</b>下のカードにカンペを書いて「📌 カンペを最前面に表示」を押すと、小窓がZoomより手前に常に浮かびます（Chrome / Edge対応）。内容は自動保存されます。<br>
    <b>⚠ 画面共有の注意：</b>Zoomで共有するときは「画面全体」ではなく<b>特定のウィンドウだけ</b>を共有すれば、カンペは相手に見えません。小窓はカメラの近くに置くと目線のブレが少なくなります。
  </div>
  <div id="cards"></div>
</main>

<div class="status" id="status">保存しました ✓</div>

<script>
const STORAGE_KEY = "kanpe-cards-v1";

const defaultCards = [
  { title: "自己紹介（1分）", body: "・名前、現職/現状\n・これまでの経験の要約\n・今日伝えたいこと一言" },
  { title: "志望動機", body: "・なぜこの会社か\n・なぜこの職種か\n・入社後にやりたいこと" },
  { title: "強み・弱み", body: "強み：〇〇（具体エピソード）\n弱み：〇〇（改善のためにしていること）" },
  { title: "逆質問", body: "・入社後最初の3ヶ月で期待される役割は？\n・チームの雰囲気や働き方について\n・活躍している人の共通点は？" },
];

let cards = load();
let pipWin = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) return parsed;
    }
  } catch (e) {}
  return JSON.parse(JSON.stringify(defaultCards));
}

let toastTimer = null;
function toast(msg) {
  const s = document.getElementById("status");
  s.textContent = msg;
  s.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    s.classList.remove("show");
    s.textContent = "保存しました ✓";
  }, 4000);
}

let saveTimer = null;
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
  const s = document.getElementById("status");
  s.textContent = "保存しました ✓";
  s.classList.add("show");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => s.classList.remove("show"), 1200);
  refreshPip();
}

function render() {
  const wrap = document.getElementById("cards");
  wrap.innerHTML = "";
  cards.forEach((card, i) => {
    const el = document.createElement("div");
    el.className = "card";

    const head = document.createElement("div");
    head.className = "card-head";

    const title = document.createElement("input");
    title.value = card.title;
    title.placeholder = "タイトル";
    title.addEventListener("input", () => { cards[i].title = title.value; save(); });

    const up = document.createElement("button");
    up.className = "move";
    up.textContent = "↑";
    up.title = "上へ";
    up.onclick = () => {
      if (i === 0) return;
      [cards[i - 1], cards[i]] = [cards[i], cards[i - 1]];
      save(); render();
    };

    const down = document.createElement("button");
    down.className = "move";
    down.textContent = "↓";
    down.title = "下へ";
    down.onclick = () => {
      if (i === cards.length - 1) return;
      [cards[i + 1], cards[i]] = [cards[i], cards[i + 1]];
      save(); render();
    };

    const del = document.createElement("button");
    del.className = "del";
    del.textContent = "✕";
    del.title = "削除";
    del.onclick = () => {
      if (!confirm(`「${card.title || "無題"}」を削除しますか？`)) return;
      cards.splice(i, 1);
      save(); render();
    };

    head.append(title, up, down, del);

    const body = document.createElement("textarea");
    body.value = card.body;
    body.placeholder = "カンペの内容…";
    body.addEventListener("input", () => { cards[i].body = body.value; save(); });

    el.append(head, body);
    wrap.append(el);
  });
}

document.getElementById("addBtn").onclick = () => {
  cards.push({ title: "新しいカード", body: "" });
  save(); render();
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
};

// ---------- PiP（最前面小窓） ----------
document.getElementById("pipBtn").onclick = async () => {
  if (pipWin && !pipWin.closed) { pipWin.close(); pipWin = null; return; }

  if ("documentPictureInPicture" in window) {
    try {
      pipWin = await documentPictureInPicture.requestWindow({ width: 360, height: 520 });
      buildPip(pipWin);
      pipWin.addEventListener("pagehide", () => { pipWin = null; });
    } catch (e) {
      console.error("PiP失敗:", e);
      toast("最前面小窓を開けませんでした。Chrome / Edge の通常ウィンドウで開いてください。");
      pipWin = null;
    }
  } else {
    // フォールバック（最前面固定はされない）
    pipWin = window.open("", "kanpe", "width=360,height=520,resizable=yes");
    if (pipWin) buildPip(pipWin);
    toast("このブラウザは最前面固定に未対応です。Chrome / Edge の最新版をおすすめします。");
  }
};

function buildPip(win) {
  const doc = win.document;
  doc.head.innerHTML = `<meta charset="UTF-8"><title>カンペ</title>`;
  const style = doc.createElement("style");
  style.textContent = `
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0f1117;
      color: #e8eaf2;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .bar {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 8px;
      overflow-x: auto;
      flex-shrink: 0;
      background: #171a24;
      border-bottom: 1px solid #2a2e3f;
      scrollbar-width: thin;
    }
    .chip {
      flex-shrink: 0;
      background: #232736;
      color: #cdd3e8;
      border: none;
      border-radius: 14px;
      padding: 5px 12px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }
    .chip:hover { background: #2f3550; }
    .fontbtn {
      flex-shrink: 0;
      background: #1c2233;
      color: #8a90a5;
      border: 1px solid #2c3550;
      border-radius: 6px;
      width: 26px;
      height: 26px;
      font-size: 13px;
      cursor: pointer;
      padding: 0;
    }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 40px;
      scrollbar-width: thin;
    }
    h2 {
      font-size: 0.85em;
      color: #4f8cff;
      margin: 18px 0 6px;
      border-bottom: 1px solid #2a2e3f;
      padding-bottom: 4px;
    }
    h2:first-child { margin-top: 0; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
      font-size: 1em;
      line-height: 1.75;
      margin: 0;
    }
  `;
  doc.head.append(style);

  doc.body.innerHTML = `
    <div class="bar">
      <button class="fontbtn" id="fMinus">−</button>
      <button class="fontbtn" id="fPlus">＋</button>
    </div>
    <div class="content" id="content"></div>
  `;

  let fontSize = parseInt(localStorage.getItem("kanpe-font") || "15", 10);
  const content = doc.getElementById("content");
  const bar = doc.querySelector(".bar");

  function applyFont() {
    content.style.fontSize = fontSize + "px";
    localStorage.setItem("kanpe-font", String(fontSize));
  }
  doc.getElementById("fMinus").onclick = () => { fontSize = Math.max(11, fontSize - 1); applyFont(); };
  doc.getElementById("fPlus").onclick = () => { fontSize = Math.min(28, fontSize + 1); applyFont(); };

  win.renderCards = () => {
    // セクション本体
    content.innerHTML = "";
    cards.forEach((card, i) => {
      const h = doc.createElement("h2");
      h.id = "sec-" + i;
      h.textContent = card.title || "無題";
      const p = doc.createElement("pre");
      p.textContent = card.body;
      content.append(h, p);
    });
    // ジャンプ用チップ（フォントボタン以降を作り直す）
    bar.querySelectorAll(".chip").forEach(c => c.remove());
    cards.forEach((card, i) => {
      const chip = doc.createElement("button");
      chip.className = "chip";
      chip.textContent = card.title || "無題";
      chip.onclick = () => doc.getElementById("sec-" + i).scrollIntoView({ behavior: "smooth" });
      bar.append(chip);
    });
  };

  applyFont();
  win.renderCards();
}

function refreshPip() {
  if (pipWin && !pipWin.closed && pipWin.renderCards) pipWin.renderCards();
}

render();
</script>
</body>
</html>
